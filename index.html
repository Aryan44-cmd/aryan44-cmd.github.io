<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Arnix Ludo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins',sans-serif;}

.screen{
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  position:relative;overflow:hidden;
}

/* Background */
.bg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:url('background.png');
  background-size:cover;background-position:center;
  z-index:0;
}

/* Logo area - top 30% */
.logo-area{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
  margin-top:6vh;
  animation:fadeDown 0.8s ease forwards;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}

.logo-img{
  width:200px;
  max-width:55vw;
  filter:drop-shadow(0 8px 24px rgba(255,107,43,0.3));
  animation:logoPulse 2.5s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* Dice/Hero - middle */
.hero-area{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;
  flex:1;
  animation:fadeUp 0.9s ease 0.3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

.hero-img{
  width:340px;
  max-width:90vw;
  filter:drop-shadow(0 16px 40px rgba(0,0,0,0.12));
  animation:heroFloat 3s ease-in-out infinite;
}
@keyframes heroFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

/* Progress - bottom */
.progress-area{
  position:relative;z-index:2;
  width:100%;
  padding:0 40px 50px;
  animation:fadeUp 0.9s ease 0.5s both;
}

.progress-pct{
  font-size:1rem;font-weight:700;
  color:rgba(255,255,255,0.95);
  text-align:center;margin-bottom:10px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.progress-track{
  height:20px;
  background:rgba(255,255,255,0.4);
  border-radius:99px;overflow:hidden;
  border:2px solid rgba(255,255,255,0.7);
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.08);
}

.progress-fill{
  height:100%;width:0%;
  border-radius:99px;
  background:linear-gradient(90deg,#FF4500,#FF6B2B,#FFD60A);
  background-size:200% 100%;
  transition:width 0.15s linear;
  box-shadow:0 0 20px rgba(255,107,43,0.5);
  animation:shimmer 1.5s linear infinite;
}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}

.loading-text{
  text-align:center;margin-top:12px;
  font-size:0.92rem;font-weight:500;
  color:rgba(255,255,255,0.85);
  letter-spacing:0.02em;
  text-shadow:0 1px 6px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="screen">
  <div class="bg"></div>

  <!-- Logo -->
  <div class="logo-area">
    <img class="logo-img" src="logo.png" alt="Arnix Ludo"/>
  </div>

  <!-- Dice Hero -->
  <div class="hero-area">
    <img class="hero-img" src="dice.png" alt="Dice and Tokens"/>
  </div>

  <!-- Progress Bar -->
  <div class="progress-area">
    <div class="progress-pct" id="pct">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <div class="loading-text" id="msg">Preparing your game...</div>
  </div>
</div>

<script>
let p=0;
const fill=document.getElementById('fill');
const pct=document.getElementById('pct');
const msg=document.getElementById('msg');
const msgs=['Preparing your game...','Loading assets...','Almost ready...','Let\'s play! 🎲'];
let mi=0;

const iv=setInterval(()=>{
  p+=Math.random()*2.2+0.6;
  if(p>=100){
    p=100;clearInterval(iv);
    msg.textContent=msgs[3];
    setTimeout(()=>{window.location.href='menu.html';},700);
  }
  fill.style.width=p+'%';
  pct.textContent=Math.floor(p)+'%';
  if(p>30&&mi===0){mi=1;msg.textContent=msgs[1];}
  if(p>65&&mi===1){mi=2;msg.textContent=msgs[2];}
  if(p>90&&mi===2){mi=3;msg.textContent=msgs[3];}
},65);
</script>
</body>
</html>
