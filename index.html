<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Arnix Ludo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins',sans-serif;}

.screen{
  width:100%;height:100vh;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;
}

/* Background */
.bg{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  background-image:url('background.png');
  background-size:cover;background-position:center;
  z-index:0;
}

/* Logo - fixed upar */
.logo-area{
  position:relative;z-index:2;
  margin-top:12vh;
  display:flex;align-items:center;justify-content:center;
  animation:fadeDown 0.8s ease forwards;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

.logo-img{
  width:60vw;max-width:260px;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,0.15));
  animation:logoPulse 2.5s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

/* Dice - beech mein, logo ke bilkul neeche */
.hero-area{
  position:relative;z-index:2;
  margin-top:4vh;
  display:flex;align-items:center;justify-content:center;
  animation:fadeUp 0.9s ease 0.3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.hero-img{
  width:70vw;max-width:300px;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,0.12));
  animation:heroFloat 3s ease-in-out infinite;
}
@keyframes heroFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

/* Progress - bilkul neeche fixed */
.progress-area{
  position:absolute;
  bottom:6vh;
  left:0;right:0;
  z-index:2;
  padding:0 50px;
  animation:fadeUp 0.9s ease 0.5s both;
}

.progress-pct{
  font-size:1rem;font-weight:700;
  color:#fff;
  text-align:center;margin-bottom:8px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.progress-track{
  height:52px;
  background:rgba(255,255,255,0.45);
  border-radius:99px;overflow:hidden;
  border:3px solid rgba(255,255,255,0.9);
  box-shadow:0 0 0 4px rgba(255,255,255,0.5), 0 8px 24px rgba(0,0,0,0.15);
}

.progress-fill{
  height:100%;width:0%;
  border-radius:99px;
  background:linear-gradient(90deg,#FF4500,#FF7B00,#FFD60A);
  transition:width 0.12s linear;
  box-shadow:0 0 16px rgba(255,107,43,0.6);
  position:relative;overflow:hidden;
}
/* Shimmer effect on bar */
.progress-fill::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:barShimmer 1.2s linear infinite;
}
@keyframes barShimmer{0%{left:-60%;}100%{left:160%;}}

.loading-text{
  text-align:center;margin-top:10px;
  font-size:0.88rem;font-weight:500;
  color:rgba(255,255,255,0.85);
  letter-spacing:0.02em;
  text-shadow:0 1px 4px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="screen">
  <div class="bg"></div>

  <!-- Logo TOP -->
  <div class="logo-area">
    <img class="logo-img" src="logo.png" alt="Arnix Ludo"/>
  </div>

  <!-- Dice MIDDLE -->
  <div class="hero-area">
    <img class="hero-img" src="dice.png" alt="Dice"/>
  </div>

  <!-- Progress BOTTOM FIXED -->
  <div class="progress-area">
    <div class="progress-pct" id="pct">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <div class="loading-text" id="msg">Preparing your game...</div>
  </div>
</div>

<script>
let p=0;
const fill=document.getElementById('fill');
const pct=document.getElementById('pct');
const msg=document.getElementById('msg');
const msgs=['Preparing your game...','Loading assets...','Almost ready...','Let\'s play! 🎲'];
let mi=0;
const iv=setInterval(()=>{
  p+=Math.random()*2+0.8;
  if(p>=100){
    p=100;clearInterval(iv);
    msg.textContent=msgs[3];
    setTimeout(()=>{window.location.href='menu.html';},700);
  }
  fill.style.width=p+'%';
  pct.textContent=Math.floor(p)+'%';
  if(p>30&&mi===0){mi=1;msg.textContent=msgs[1];}
  if(p>65&&mi===1){mi=2;msg.textContent=msgs[2];}
  if(p>90&&mi===2){mi=3;msg.textContent=msgs[3];}
},65);
</script>
</body>
</html>
